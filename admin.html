<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>응급 키링 관리</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
  }
  .header {
    background: #D63031;
    padding: 24px 20px;
    text-align: center;
  }
  .header h1 { color: white; font-size: 22px; font-weight: 700; }
  .header p { color: rgba(255,255,255,0.75); font-size: 13px; margin-top: 6px; }

  .container { max-width: 480px; margin: 0 auto; padding: 20px 16px 40px; }

  .count-badge {
    background: white; border-radius: 12px;
    padding: 14px 16px; margin-bottom: 16px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .count-badge span { font-size: 14px; color: #636e72; }
  .count-badge strong { font-size: 20px; color: #D63031; font-weight: 700; }

  .person-card {
    background: white; border-radius: 14px;
    margin-bottom: 12px; overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .person-info {
    display: flex; align-items: center;
    padding: 16px;
    border-bottom: 1px solid #f5f5f5;
  }
  .avatar {
    width: 44px; height: 44px; border-radius: 22px;
    background: #D63031; color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; flex-shrink: 0;
  }
  .person-detail { margin-left: 12px; flex: 1; }
  .person-detail .name { font-size: 17px; font-weight: 700; color: #2d3436; }
  .person-detail .meta { font-size: 12px; color: #b2bec3; margin-top: 2px; }

  .url-area { padding: 12px 16px; background: #fafafa; }
  .url-text {
    font-size: 12px; color: #636e72;
    word-break: break-all; line-height: 1.5;
    margin-bottom: 10px;
  }
  .btn-group { display: flex; gap: 8px; }
  .btn {
    flex: 1; border: none; border-radius: 8px;
    padding: 10px; font-size: 13px; font-weight: 600;
    cursor: pointer; text-decoration: none;
    text-align: center; transition: opacity 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { opacity: 0.8; }
  .btn-copy { background: #D63031; color: white; }
  .btn-open { background: #f0f0f0; color: #2d3436; }

  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2d3436; color: white;
    padding: 12px 24px; border-radius: 10px;
    font-size: 13px; opacity: 0;
    transition: all 0.3s; pointer-events: none;
    white-space: nowrap; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <h1>🚨 응급 키링 관리</h1>
  <p>NFC 기록용 URL을 확인하고 복사하세요</p>
</div>

<div class="container">

  <div class="count-badge">
    <span>등록된 인원</span>
    <strong>2명</strong>
  </div>

  <!-- 송자현 -->
  <div class="person-card">
    <div class="person-info">
      <div class="avatar">송</div>
      <div class="person-detail">
        <div class="name">송자현</div>
        <div class="meta">1963년생 · O형 · 여성</div>
      </div>
    </div>
    <div class="url-area">
      <div class="url-text">https://caminar1004.github.io/emergency-keyring/</div>
      <div class="btn-group">
        <button class="btn btn-copy" onclick="copyURL('https://caminar1004.github.io/emergency-keyring/', this)">📋 URL 복사</button>
        <a class="btn btn-open" href="https://caminar1004.github.io/emergency-keyring/" target="_blank">🔗 페이지 열기</a>
      </div>
    </div>
  </div>

  <!-- 김선애 -->
  <div class="person-card">
    <div class="person-info">
      <div class="avatar">김</div>
      <div class="person-detail">
        <div class="name">김선애</div>
        <div class="meta">1945년생 · O형 · 여성</div>
      </div>
    </div>
    <div class="url-area">
      <div class="url-text">https://caminar1004.github.io/emergency-keyring/kim-sunae.html</div>
      <div class="btn-group">
        <button class="btn btn-copy" onclick="copyURL('https://caminar1004.github.io/emergency-keyring/kim-sunae.html', this)">📋 URL 복사</button>
        <a class="btn btn-open" href="https://caminar1004.github.io/emergency-keyring/kim-sunae.html" target="_blank">🔗 페이지 열기</a>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
function copyURL(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    showToast('URL이 복사됐어요!');
    btn.textContent = '✅ 복사완료';
    setTimeout(() => btn.textContent = '📋 URL 복사', 2000);
  }).catch(() => {
    // 클립보드 API 안 되면 직접 선택
    const el = document.createElement('textarea');
    el.value = url;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('URL이 복사됐어요!');
    btn.textContent = '✅ 복사완료';
    setTimeout(() => btn.textContent = '📋 URL 복사', 2000);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
